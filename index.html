<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Needs Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>CFC DL Needs Board</h1>

    <div class="form">
      <input type="text" id="nameInput" placeholder="Your Name" />
      <textarea id="needInput" placeholder="What do you need?"></textarea>
      <button id="addBtn">Add Need</button>
    </div>

    <h2>Open Needs</h2>
    <div id="needsList"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
